# Database - H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable mail for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=dummy

# Twilio dummy values
twilio.account.sid=ACdummyaccountsid
twilio.auth.token=dummyauthtoken
twilio.phone.number=+10000000000

# JWT
app.jwt.secret=dummysecretkeyfortestingonlydummysecretkeyfortestingonly
app.jwt.expiration=86400000